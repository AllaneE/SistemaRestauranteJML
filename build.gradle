plugins {
    id 'java'
    id 'application'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

application {
    mainClass = 'Main'
}

dependencies {
    testImplementation platform('org.junit:junit-bom:6.0.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

jar {
    manifest {
        attributes 'Main-Class': 'Main'
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

run {
    standardInput = System.in
}

tasks.register('verifyJML', Exec) {
    group = 'verification'
    description = 'Executa o OpenJML com Extended Static Checking (ESC) para verificar os contratos matemáticos.'

    // Caminho exato para o ficheiro executável na sua máquina
    def openjmlPath = '/home/pulisaglio/Documentos/JML/openjml'

    // O comando aponta para a pasta raiz dos seus códigos fonte
    commandLine openjmlPath, '-esc', '-sourcepath', 'src/main/java', 'src/main/java/restaurante/model/Reserva.java'
    ignoreExitValue true
}
